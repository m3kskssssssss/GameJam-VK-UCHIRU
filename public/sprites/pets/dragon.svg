<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Body -->
  <ellipse cx="30" cy="46" rx="13" ry="11" fill="#52c87a"/>
  <!-- Tail -->
  <path d="M43,50 Q58,48 60,40 Q58,34 54,36" fill="none" stroke="#52c87a" stroke-width="5" stroke-linecap="round"/>
  <!-- Wing right -->
  <path d="M40,36 Q52,24 50,16 Q44,22 36,30" fill="#3aad60" opacity="0.9"/>
  <!-- Wing left (behind body) -->
  <path d="M22,36 Q10,24 12,16 Q18,22 26,30" fill="#3aad60" opacity="0.6"/>
  <!-- Neck -->
  <ellipse cx="30" cy="34" rx="8" ry="6" fill="#52c87a"/>
  <!-- Head -->
  <ellipse cx="30" cy="22" rx="12" ry="11" fill="#52c87a"/>
  <!-- Snout -->
  <ellipse cx="30" cy="28" rx="7" ry="5" fill="#3aad60"/>
  <!-- Horn left -->
  <polygon points="21,14 23,6 26,14" fill="#f5b041"/>
  <!-- Horn right -->
  <polygon points="39,14 37,6 34,14" fill="#f5b041"/>
  <!-- Eyes -->
  <ellipse cx="25" cy="20" rx="3" ry="3.5" fill="#f5b041"/>
  <ellipse cx="35" cy="20" rx="3" ry="3.5" fill="#f5b041"/>
  <ellipse cx="25" cy="20" rx="1.5" ry="2.5" fill="#2d2d2d"/>
  <ellipse cx="35" cy="20" rx="1.5" ry="2.5" fill="#2d2d2d"/>
  <circle cx="25.5" cy="19" r="0.8" fill="white"/>
  <circle cx="35.5" cy="19" r="0.8" fill="white"/>
  <!-- Nostrils -->
  <circle cx="27.5" cy="28" r="1" fill="#2d6640"/>
  <circle cx="32.5" cy="28" r="1" fill="#2d6640"/>
  <!-- Mouth / smile -->
  <path d="M24,30 Q30,34 36,30" fill="none" stroke="#2d6640" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Belly scales -->
  <ellipse cx="30" cy="44" rx="8" ry="6" fill="#7fe8a0" opacity="0.7"/>
  <!-- Claws -->
  <ellipse cx="20" cy="56" rx="5" ry="3.5" fill="#3aad60"/>
  <ellipse cx="40" cy="56" rx="5" ry="3.5" fill="#3aad60"/>
</svg>
